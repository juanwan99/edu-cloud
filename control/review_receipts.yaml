# Minimal review-receipt lane policy for edu-cloud governance.
#
# This file declares conservative review-receipt lanes in terms of the EXISTING
# Yuanshou review-receipt-record primitive (yuanshou_v2/review_receipt.py +
# v2/schemas/review-receipt.v2.schema.json). It is a policy projection, not a new
# governance layer: every field below maps directly onto a value the runtime
# already validates (`make_record` / `validate_record`).
#
# Vocabulary mirrored from the primitive (do not drift):
#   review_type : plan_review | code_review | integration_review
#   decision    : pass | fail | waived
#   author rule : code_review/integration_review author == contract.executor,
#                 plan_review author == contract.created_by; reviewer must never
#                 be the author (_same_identity enforced by the runtime).
schema: edu-cloud-review-receipts.v1

# Allowed enums are restated here only so edu-cloud CI can assert the lanes never
# drift away from what the Yuanshou runtime accepts. They are not a redefinition.
review_types: [plan_review, code_review, integration_review]
decisions: [pass, fail, waived]

lanes:
  B2b:
    description: >-
      Non-author code review of governance-mutating edu-cloud contracts. The
      Claude executor implements inside the contract scope; Codex performs the
      independent code review and records the receipt before closeout.
    review_type: code_review
    reviewer: codex          # non-author reviewer; bound to review_policy.reviewer
    author: claude_code      # contract executor; must never equal the reviewer
    non_author_review: true  # reviewer must not be the author (runtime-enforced)
    required_decision: pass  # closeout proceeds only on a pass receipt
    report_dir: docs/reviews # review report lives under the repo docs/reviews tree
    # Fields a recorded B2b receipt must carry. These mirror the runtime-required
    # properties of yuanshou-review-receipt.v2 (v2/schemas/review-receipt.v2.schema.json),
    # so a B2b receipt is only accepted when it binds the active contract
    # (contract_id/contract_hash), identifies itself and its non-author reviewer,
    # pins the reviewed commit and report (reviewed_sha/report_path/report_sha256),
    # and carries the lane decision and route metadata.
    required_receipt_fields:
      - contract_id
      - contract_hash
      - receipt_id
      - reviewer
      - review_type
      - reviewed_sha
      - decision
      - report_path
      - report_sha256
      - metadata
    metadata:
      route: B2b
      non_author_review: true
