title = "steward-gitleaks"

[extend]
useDefault = true

[[rules]]
id = "steward-openai-key"
description = "OpenAI API key"
regex = '''sk-[A-Za-z0-9_\-]{20,}'''
tags = ["key", "openai"]

[[rules]]
id = "steward-github-token"
description = "GitHub token"
regex = '''gh[pousr]_[A-Za-z0-9_]{30,}'''
tags = ["key", "github"]
