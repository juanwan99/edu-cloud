rules:
  - id: scan-endpoint-missing-tenant-check
    message: |
      Scan endpoint is missing a _check_scan_path_tenant() call.
      Endpoints in pipeline_router.py that handle user paths must verify tenant ownership.
      If this endpoint does not handle user paths, add # nosemgrep with a reason.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-inside: |
          @router.$METHOD(...)
          async def $FUNC(...):
              ...
      - pattern-not: |
          @router.$METHOD(...)
          async def $FUNC(...):
              ...
              await _check_scan_path_tenant(...)
              ...
    paths:
      include:
        - "**/scan/pipeline_router.py"

  - id: router-missing-school-id-filter
    message: |
      Router endpoint executes a database query without a school_id filter.
      Multi-tenant isolation requires data queries to stay inside a school_id boundary.
      If this endpoint does not need tenant isolation, add # nosemgrep with a reason.
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-inside: |
          @router.$METHOD(...)
          async def $FUNC(...):
              ...
      - pattern: $DB.execute($QUERY, ...)
      - pattern-not-regex: school_id
    paths:
      include:
        - "**/modules/*/router.py"

  - id: path-traversal-unvalidated-join
    message: |
      os.path.join or Path() uses a value that may come from user input.
      Validate that the resolved path cannot escape the expected directory.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: os.path.join($BASE, ..., $USER_INPUT, ...)
          - pattern: Path($BASE) / ... / $USER_INPUT
    paths:
      include:
        - "**/modules/*/router.py"
        - "**/modules/*/*.py"
      exclude:
        - "**/test*"
