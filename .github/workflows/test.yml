name: Tests
on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1 libglib2.0-0 libzbar0 libzbar-dev
      - run: pip install -e ".[dev]" pymupdf
      - run: python -m pytest --tb=short -q --ignore=tests/governance --ignore=tests/test_services_exam/test_tql_renderer.py --ignore=tests/test_services_exam/test_card_e2e.py -k "not test_alembic_migration"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd frontend && npm ci --ignore-scripts
      - run: cd frontend && npx vitest run
      - run: cd frontend && npm audit --audit-level=high
