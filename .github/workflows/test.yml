name: Tests
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              git diff-tree --no-commit-id --name-only -r "$head" > changed-files.txt
              initial_push=true
            else
              initial_push=false
            fi
          fi
          if [[ "${initial_push:-false}" != "true" ]]; then
            if ! git cat-file -e "$base^{commit}" 2>/dev/null || ! git cat-file -e "$head^{commit}" 2>/dev/null; then
              git fetch --no-tags --prune --depth=100 origin "$base" "$head"
            fi
            if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              echo "::error::Unable to resolve base commit $base for CI path filter"
              exit 1
            fi
            if ! git cat-file -e "$head^{commit}" 2>/dev/null; then
              echo "::error::Unable to resolve head commit $head for CI path filter"
              exit 1
            fi
            git diff --name-only "$base" "$head" > changed-files.txt
          fi
          python - <<'PY'
          from pathlib import Path

          files = [line.strip() for line in Path("changed-files.txt").read_text().splitlines() if line.strip()]
          workflow = any(path.startswith(".github/workflows/") for path in files)
          frontend = workflow or any(path.startswith("frontend/") for path in files)

          backend = workflow
          backend_roots = ("src/", "alembic/", "deploy/", "tests/test_")
          backend_files = {
              "Dockerfile",
              "docker-compose.yml",
              "docker-compose.yaml",
              "pyproject.toml",
              "uv.lock",
              "tests/conftest.py",
              "tests/governance/test_module_semantics.py",
              "scripts/governance/check_module_semantics.py",
          }
          for path in files:
              if path in backend_files or path.startswith(backend_roots):
                  backend = True
                  break

          with Path(__import__("os").environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              fh.write(f"backend={str(backend).lower()}\n")
              fh.write(f"frontend={str(frontend).lower()}\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: changed-files
          path: changed-files.txt

  governance:
    runs-on: ubuntu-latest
    env:
      UV_FROZEN: "1"
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev --python 3.11
      - run: uv run python -m py_compile scripts/codex_support.py scripts/codex-context scripts/codex-check scripts/codex-verify scripts/guardian_runtime.py scripts/guardian-watch scripts/run-arq-worker
      - run: uv run python -m py_compile scripts/governance/aggregate_modules.py scripts/governance/check_ai_tool_modules.py scripts/governance/check_execution_policy.py scripts/governance/check_module_dependencies.py scripts/governance/check_permission_mirror.py scripts/governance/module_governance_guard.py scripts/governance/steward_scope_gate.py
      - run: uv run python -m py_compile scripts/yuanqi/legacy_quarantine_gate.py
      - run: uv run python scripts/governance/check_execution_policy.py
      - run: uv run python -m pytest tests/governance/test_codex_scripts.py -q
      - run: uv run python -m pytest tests/governance/test_aggregate_modules.py tests/governance/test_ai_tool_modules.py tests/governance/test_execution_policy.py tests/governance/test_module_dependencies.py tests/governance/test_module_governance_guard.py tests/governance/test_permission_mirror.py tests/governance/test_portal_contract.py tests/governance/test_steward_scope_gate.py tests/governance/test_tenant_static.py -q
      - run: uv run python scripts/governance/aggregate_modules.py --check
      - run: uv run python scripts/governance/check_ai_tool_modules.py
      - run: uv run python scripts/governance/check_module_dependencies.py --check
      - run: uv run python scripts/governance/check_doc_pollution.py --check
      - run: uv run python scripts/yuanqi/legacy_quarantine_gate.py --check
      - run: uv run python scripts/governance/check_permission_mirror.py
      - run: uv run python scripts/governance/module_governance_guard.py --git-hook-mode --repo "$(pwd)"
      - run: uv run scripts/codex-check --no-network
      - run: uv run scripts/codex-context --no-network
      - run: uv run scripts/codex-verify safety --repo-wide
      - run: uv run scripts/codex-verify full --dry-run --schema --no-network
      - run: uv run python -m pytest tests/governance/test_governance_registry.py -q
      - run: uv run python -m pytest tests/yuanqi -q
      - name: Check Yuanqi registry staleness
        run: uv run python scripts/yuanqi/registry_doctor.py --strict

  task-gate:
    needs: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      UV_FROZEN: "1"
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev --python 3.11
      - name: Download changed files
        uses: actions/download-artifact@v4
        with:
          name: changed-files
      - id: yuanqi-task
        name: Detect legacy Yuanqi task declaration
        shell: python
        run: |
          import json
          import os
          import re
          from pathlib import Path

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          body = event.get("pull_request", {}).get("body") or ""
          present = bool(re.search(r"(?m)^\s*Yuanqi-Task:\s*yq-[A-Za-z0-9._-]+\s*$", body))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              fh.write(f"present={str(present).lower()}\n")
      - name: Resolve Yuanqi task
        if: steps.yuanqi-task.outputs.present == 'true'
        run: uv run python scripts/yuanqi/resolve_pr_task.py --event "$GITHUB_EVENT_PATH" --head-ref "${{ github.head_ref }}" > task-id.txt
      - name: Validate Yuanqi task schema
        if: steps.yuanqi-task.outputs.present == 'true'
        run: uv run python scripts/yuanqi/task_schema.py ".yuanqi/tasks/$(cat task-id.txt).yml"
      - name: Check Yuanqi task overlap
        if: steps.yuanqi-task.outputs.present == 'true'
        run: uv run python scripts/yuanqi/overlap_gate.py --candidate ".yuanqi/tasks/$(cat task-id.txt).yml" --tasks-dir .yuanqi/tasks --pr "${{ github.event.pull_request.number }}" --head "${{ github.event.pull_request.head.sha }}"
      - name: Check Yuanqi task scope
        if: steps.yuanqi-task.outputs.present == 'true'
        run: uv run python scripts/yuanqi/scope_gate.py --task ".yuanqi/tasks/$(cat task-id.txt).yml" --changed changed-files.txt
      - name: Check Yuanqi registry staleness
        if: steps.yuanqi-task.outputs.present == 'true'
        run: uv run python scripts/yuanqi/registry_doctor.py --strict

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      UV_FROZEN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1 libglib2.0-0 libzbar0 libzbar-dev
      - run: uv sync --frozen --extra dev --python 3.11
      - name: Dependency & route diagnostics
        run: |
          uv run python - <<'PY'
          import sys
          from importlib.metadata import version
          print("python", sys.version.split()[0])
          for p in ("fastapi", "starlette", "pytest"):
              print(p, version(p))
          from edu_cloud.api.app import create_app
          print("app routes", len(create_app().routes))
          from edu_cloud.modules.school.router import router as school_router
          print("school_router routes", len(school_router.routes))
          PY
      - name: Backend pytest (main suite)
        timeout-minutes: 30
        run: >-
          uv run python -m pytest --tb=short -q --durations=25
          --ignore=tests/governance
          --ignore=tests/test_services_exam/test_tql_renderer.py
          --ignore=tests/test_services_exam/test_card_e2e.py
          -k "not (test_alembic_migration or test_alembic_s1 or test_card_publish or test_grading_worker or test_objective_only_not_ready)"
      - run: uv run python -m pytest tests/test_alembic_migration.py -q
      - run: uv run python -m pytest tests/governance/test_module_semantics.py -q
      - run: uv run python scripts/governance/check_module_semantics.py --check

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd frontend && npm ci --ignore-scripts
      - run: cd frontend && npx vitest run
      - run: cd frontend && npm run build
      - run: cd frontend && npm audit --audit-level=high
