name: Tests
on: [push, pull_request]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install pytest
      - run: python -m py_compile scripts/codex_support.py scripts/codex-context scripts/codex-check scripts/codex-consult-claude scripts/codex-verify scripts/meta_runtime.py scripts/meta-check scripts/guardian_runtime.py scripts/guardian-watch scripts/run-arq-worker
      - run: python -m pytest tests/governance/test_codex_scripts.py -q
      - run: scripts/codex-check --no-network
      - run: scripts/meta-check --json --strict
      - run: scripts/codex-context --no-network
      - run: scripts/codex-consult-claude --dry-run review CI smoke
      - run: scripts/codex-verify safety --repo-wide
      - run: scripts/codex-verify full --dry-run --schema --no-network

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1 libglib2.0-0 libzbar0 libzbar-dev
      - run: pip install -e ".[dev]" pymupdf
      - run: >-
          python -m pytest --tb=short -q
          --ignore=tests/governance
          --ignore=tests/test_services_exam/test_tql_renderer.py
          --ignore=tests/test_services_exam/test_card_e2e.py
          -k "not (test_alembic_migration or test_alembic_s1 or test_card_publish or test_grading_worker or test_objective_only_not_ready)"
      - run: python -m pytest tests/test_alembic_migration.py -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd frontend && npm ci --ignore-scripts
      - run: cd frontend && npx vitest run
      - run: cd frontend && npm run build
      - run: cd frontend && npm audit --audit-level=high
