version: 2

# ── 第一层：9 个学校开关码（镜像 school_settings.py::MODULE_CODES）
school_module_codes: [exam, grading, homework, study_analytics, research, teaching, calendar, studio, conduct]

# ── 第二层：23 架构模块 → 开关码归属（键集校验自 modules.yaml）
architecture_to_module_code:
  exam: exam
  exam_import: exam
  scan: exam
  card: exam
  pipeline: exam
  paper: exam
  grading: grading
  marking: grading
  analytics: study_analytics
  profile: study_analytics
  adaptive: study_analytics
  knowledge: research
  knowledge_tree: research
  bank: research
  homework: homework
  calendar: calendar
  studio: studio
  conduct: conduct
  academic: teaching
  menu: null
  portal: null
  school: null
  student: null

# ── 第三层：逐入口期望表
backend_routes:
  /api/v1/exams:            { expect: "gated:exam" }
  /api/v1/questions:        { expect: "gated:exam" }
  /api/v1/scan:             { expect: "gated:exam" }
  /api/v1/card:             { expect: "gated:exam" }
  /api/v1/templates:        { expect: "gated:exam" }
  /api/v1/pipeline:         { expect: "gated:exam" }
  /api/v1/grading:          { expect: "gated:grading" }
  /api/v1/marking:          { expect: "gated:grading" }
  /api/v1/analytics:        { expect: "gated:study_analytics" }
  /api/v1/knowledge:        { expect: "gated:research" }
  /api/v1/knowledge-tree:   { expect: "gated:research" }
  /api/v1/bank:             { expect: "gated:research" }
  /api/v1/calendar:         { expect: "gated:calendar" }
  /api/v1/studio:           { expect: "gated:studio" }
  /api/v1/homework:         { expect: "gated:homework" }
  /api/v1/academic:         { expect: "gated:teaching" }    # 0.7D: 后端 fail-open 已收口（drift 删除）
  /api/v1/conduct:          { expect: "gated:conduct" }    # 0.7B item4: 已补门控收口
  /api/v1/exam-imports:     { expect: "gated:exam" }       # 0.7B item4: 已补门控收口
  /api/v1/profile:          { expect: "gated:study_analytics" }
  /api/v1/menus:            { expect: "exempt" }           # 0.7B item5: 已入 exempt 收口
  /api/v1/portal:           { expect: "exempt" }           # 0.7B item5: 已入 exempt 收口
  /api/v1/grades:           { expect: "exempt" }           # 0.7B item5: 已入 exempt 收口
  /api/v1/teachers:         { expect: "exempt" }           # 0.7B item5: 已入 exempt 收口
  /api/v1/client-logs:      { expect: "exempt" }           # 0.7B item5: 已入 exempt 收口
  /api/v1/auth:             { expect: "exempt" }
  /api/v1/health:           { expect: "exempt" }
  /api/v1/version:          { expect: "exempt" }
  /api/v1/schools:          { expect: "exempt" }
  /api/v1/dashboard:        { expect: "exempt" }
  /api/v1/ai:               { expect: "exempt" }
  /api/v1/classes:          { expect: "exempt" }
  /api/v1/students:         { expect: "exempt" }
  /api/v1/joint-exams:      { expect: "exempt" }
  /api/v1/notifications:    { expect: "exempt" }
  /api/v1/llm-config:       { expect: "exempt" }
  /api/v1/workspace:        { expect: "exempt" }

# Non-API static mounts are outside school-module gating, but they are still part
# of the controlled surface denominator: any new StaticFiles mount must be
# explicitly registered here instead of silently bypassing module semantics.
static_mounts:
  /uploads:
    expect: public_upload_asset
    name: uploads
    module_gate: exempt
    reason: uploaded files are served as assets; module authorization is enforced at the API endpoints that create or reference them

frontend_route_module:
  /exams: exam
  /exam-import: exam
  /marking: grading
  /grading/tasks: grading
  /ai-grading: grading
  /analytics/report: study_analytics
  /analytics/ai-report: study_analytics
  /homework: homework
  /question-bank: research
  /knowledge-tree: research
  /error-book: research
  /conduct: conduct
  /conduct/settings: conduct
  /calendar: calendar
  # 动态/detail 路由（router-meta 专有，R5 F-001 纳入同一基线分母）
  /exams/:id: exam
  /card-dev/:examId: exam
  /grading/tasks/:id: grading
  /marking/grade/:questionId: grading
  /exams/:examId/ai-grading/:subjectId: grading
  /analytics/:examId: study_analytics
  /profile/student/:studentId: study_analytics  # R4 F-001：学生画像直达门控（authGuard 靠 to.meta 兜底）
  # 不受模块门控的露出 route（显式 null = fail-closed 分母补全，未声明的新 route 仍报红）
  "/": null  # sidebar「概览」首页 item，全角色可见，不受模块开关控制
  /students: null
  /joint-exams: null
  /joint-exams/:id: null  # 动态非门控路由（联考详情，联考不受模块开关）；登记 null 使 router_meta 动态 fail-closed 自洽
  /school-settings: null
  /academic/teaching-plans: teaching   # 0.7D: 前端接 teaching 门控（routeAccess/router-meta/sidebar）
  /academic/timetable: teaching        # 0.7D
  /academic/semesters: teaching        # 0.7D
  /assignments: null
  /selections: null
  /teachers: null
  /schools: null
  /admin/impersonate: null

portal_services_expect_self_module: true
dashboard_actions_expect_valid_only: true

# ── 第四层：已知漂移登记（1 条 = 0 backend + 1 frontend；守卫按 consumer+locus+expect+actual 四元组匹配）
# 0.7D 收口：academic 双面 fail-open 关闭——前端 /academic/* 接 teaching 门控（routeAccess/router-meta/
# sidebar）+ 后端 /api/v1/academic 补门控（ROUTE_MODULE_MAP），academic-backend-fail-open 与
# teaching-frontend-unwired 两条 drift 删除（守卫 stale-drift 检测强制：actual==expect 则必须删 drift 字段+登记）。
# 注：check_module_semantics._FRONTEND_DRIFT_PROBES 仍保留 teaching-frontend-unwired 探测器作回退守护——
# 若 academic 被改回未接 teaching（still_holds 回真）却无登记，守卫 fail-closed 报红。
# 仅余 studio-frontend-entry-missing：studio 后端已门控但前端无入口（ux 缺口，待 studio 前端 wiring）。
known_drift:
  - { id: studio-frontend-entry-missing, consumer: frontend,           locus: "studio-entry",       expect: "present",                actual: "absent",       severity: ux }
